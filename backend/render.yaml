services:
  - type: web
    name: depgraph-api
    runtime: python
    buildCommand: pip uninstall -y google-generativeai google-ai-generativelanguage || true && pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
